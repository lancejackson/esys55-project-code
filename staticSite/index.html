<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Landing Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
    
  </head>
  <body>
    <div id="heading"><h1>FelineRing</h1></div>
    <div id="dashboard">
      <p id="message">No data received yet</p>
      <a href="#" class="btn btn-secondary">Snooze</a>
    </div>
    <script>
    let currentState = 'SENSOR_NOT_TRIGGERED';
  
    if (currentState == 'SENSOR_TRIGGERED') {
      document.getElementById("message").classList.add('triggered');
      document.getElementById("message").classList.remove('passive');
     
    } else if (currentState == 'SENSOR_NOT_TRIGGERED') {
      document.getElementById("message").classList.remove('triggered');
      document.getElementById("message").classList.add('passive');
    }
    </script>
  </body>
</html>
